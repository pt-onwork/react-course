<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
    <style>
      body{
        margin-top:0px;
        margin-bottom:0px;
      }
      .onButtonOn{
        background-color:rgb(25,135,84);
        color:white;
        border:none;
        padding: 10px;
        border-radius: 5px;
      }
      .onButtonOff{
        background-color:rgb(220,52,69);
        color:white;
        border:none;
        padding: 10px;
        border-radius: 5px;
      }
      .loginSignInButton{
        background-color: rgb(0,123,255);
        color:white;
        padding: 10px;
        border-radius:5px;
        border:none;
        margin: 10px 4px;
      }
      input{
        margin: 5px;
        padding:5px;
        border-radius:5px;
        border-width:1px;
      }
      .exercise4i *{
        background-color:rgb(25,135,84);
        color:white;
        padding:10px;
        margin:5px;
        border:none;
        border-radius:2px;
      }
      .exercise4i{
        display:flex;
        justify-content:center;
        height:100vh;
        align-items:center;
        background-color:rgb(222,222,222);
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script type="text/babel">
    

    function Exercise4abc(){
      const [isButtonOn,setButtonOn]=React.useState(true);
      function setButton(){
        {isButtonOn ? setButtonOn(false) : setButtonOn(true)}
      }
      console.log(isButtonOn);

      return(
        <>
          <button className={isButtonOn ? 'onButtonOn' : 'onButtonOff'} onClick={setButton}>{isButtonOn ? 'ON' : 'OFF'}</button>
        </>
      )
    }

    function Exercise4de(){
      const [showPassword, setShowPassword] = React.useState(false);
      function visibilityPassword(){
        {!showPassword ? setShowPassword(true) : setShowPassword(false)}
      }
      return (
        <div>
          {'Hello Welcome to this website '}
          <div>
            <input placeholder='Email'/>
          </div>
          <div>
            <input placeholder='Password'
              type={showPassword ? 'text' : 'password'}
            />
            <button onClick={visibilityPassword}>{showPassword ? 'Hide' : 'Show'}</button>
          </div>
          <button className="loginSignInButton">Login</button>
          <button className="loginSignInButton">Sign Up</button>
        </div>
      )
    }

    function Exercise4fg(){
      const [time, setTime] =React.useState(dayjs().format('HH:mm:ss'));
      // console.log(time);
      React.useEffect(()=>{
        setInterval(()=>{
          const currentTime = dayjs().format('HH:mm:ss');
          setTime(currentTime);
          console.log('run code');
        },1000)
      },[]);
      return(
        <>
          Current Time: {time}
        </>
      );

    }

    function Exercise4h(){
      const [count,setCount]= React.useState(0);
      // const [autoClickOn,setAutoClick]=(false);
      const autoTimeRef = React.useRef(null);
      function updateCount(){
        setCount(count +1);
      }
      function resetCount(){
        setCount(0);
      }
      function autoTime(){
        setInterval(()=>{
          autoTimeRef.current.click();
          
        },1000)
      }
      return(
        <div className='exercise4i'>
          <button 
            onClick={updateCount}
            ref={autoTimeRef}
          >Clicked {count} times</button>
          <button
            onClick={resetCount}
          >Reset</button>
          <button 
            onClick={autoTime}
            
            >Auto Click</button>
        </div>
      );
    }

    
    const container = document.querySelector('.js-container');
    ReactDOM.createRoot(container).render(<Exercise4h />);
    </script>
  </body>
</html>
