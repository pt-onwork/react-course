<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
        function App(){
          return (
            <>
              <ProductDetails productName="Cotton Socks" price="10.90" discountPrice='5.45' imageSrc='2-images/cotton-socks.png'/>
              <ProductDetails productName="Tennis balls" price="6.00" imageSrc='2-images/tennis-balls.png'/>
              <ProductDetails productName="T-shirt" price="7.99" imageSrc='2-images/plain-t-shirt.png'/>
            </>
            
          )
        }

        function ProductDetails({productName,price,discountPrice,imageSrc}){
          return(
            <div>
              <img src={imageSrc} width='150'/>
              {productName}
              {discountPrice ?(
                <>
                <del>
                  <div>
                    Price: ${price}
                  </div>
                </del>
                <div>
                  Discount Price: ${discountPrice}
                </div>
                </>
              ):(
                <div>
                  Price: ${price}
                </div>
              )}
              
              <button>Add to Cart</button>
            </div>
          );
        }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
